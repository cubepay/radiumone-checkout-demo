<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment success — RadiumOne Checkout</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header"><h1>Demo Store &middot; payment return</h1></header>
  <div id="result">Verifying…</div>
  <p style="margin-top:1.5rem"><a href="/">&larr; Back to cart</a></p>

  <script type="module">
    // New return contract: the HPP appended only ?checkout_id=... to the URL
    // we built. Our URL also carries the nonce + order_ref we attached at
    // session-create. The server verifies the nonce against its in-memory
    // store (proves the return is for OUR session). Real fulfilment comes
    // from the webhook — this UI is for display only.
    const params = Object.fromEntries(new URLSearchParams(location.search));
    const { order_ref, nonce, checkout_id } = params;
    const resultEl = document.getElementById('result');

    if (!checkout_id || !nonce) {
      // No real session ever happened (mock mode never redirects here, and
      // direct visits skip the contract entirely).
      resultEl.innerHTML = '<p class="result-ok">&#10003; Success (mock mode &mdash; no real session)</p>';
    } else {
      try {
        const url = `/api/return-verify?checkout_id=${encodeURIComponent(checkout_id)}&nonce=${encodeURIComponent(nonce)}`;
        const res = await fetch(url);
        const data = await res.json();
        if (data.ok) {
          const status = data.session?.status ?? 'unknown';
          resultEl.innerHTML = `
            <p class="result-ok">&#10003; Return verified</p>
            <p class="result-detail">Order reference: ${order_ref ?? '—'}<br>
            Checkout ID: ${checkout_id}<br>
            Session status (live readback): <strong>${status}</strong></p>
            <p class="result-note">Fulfil orders from the RadiumOne Gateway webhook, not this redirect. Contact RadiumOne support for webhook setup.</p>`;
        } else {
          resultEl.innerHTML = `<p class="result-fail">&#10007; Return verification failed (${data.reason ?? 'unknown'})</p>`;
        }
      } catch {
        resultEl.innerHTML = '<p class="result-fail">&#10007; Server unreachable</p>';
      }
    }
  </script>
</body>
</html>
